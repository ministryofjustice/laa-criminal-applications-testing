name: Lint
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '24.x'
    - name: Install modules
      run: npm install -g pnpm && pnpm install
    - name: Run ESLint
      run: pnpm eslint
